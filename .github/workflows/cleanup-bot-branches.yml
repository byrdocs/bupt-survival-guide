name: Cleanup byrdocs-bot branches

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete byrdocs-bot/* branches without an open PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api --paginate "repos/$REPO/branches" --jq '.[].name' \
            | grep '^byrdocs-bot/' \
            | while read -r branch; do
                open=$(gh pr list --repo "$REPO" --head "$branch" --state open --json number --jq 'length')
                if [ "$open" -eq 0 ]; then
                  echo "Deleting branch (no open PR): $branch"
                  gh api -X DELETE "repos/$REPO/git/refs/heads/$branch"
                else
                  echo "Skipping (has open PR): $branch"
                fi
              done
